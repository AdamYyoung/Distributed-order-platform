server:
  port: 8001

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      default-filters:
        - name: RemoveRequestHeader
          args:
            name: Cookie
      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1   #
                redis-rate-limiter.burstCapacity: 100   # max
                key-resolver: "#{@userKeyResolver}"    # Username/IP

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/inventory/**

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/product/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notification/**
jwt:
  secret: "your-default-super-strong-secret-key-32-chars"
  expiration: 86400000