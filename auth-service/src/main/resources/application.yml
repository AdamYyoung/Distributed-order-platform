server:
  port: 8084
spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3307/testdb?useSSL=false&serverTimezone=UTC
    username: ${root}
    password: ${password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost

jwt:
  secret: "your-default-super-strong-secret-key-32-chars"
  expiration: 86400000
